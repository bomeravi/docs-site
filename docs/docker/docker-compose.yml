version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - ENV=dev
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

# Usage: adapt service names and add volumes as appropriate for your app (e.g., persistent DB volumes)
